<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="base-url" content="{{BASE_URL}}">
  <title>Your keys — Valkcryption</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body data-page="keys">
<header class="topbar">
  <span class="brand">Valkcryption</span>
  <nav>
    <a href="/">New paste</a>
    <a href="/keys">Your keys</a>
    <a href="/privacy">Privacy</a>
    <a href="/old-links">Links wont decrypt?</a>
    <a href="{{GITHUB_URL}}" rel="noopener noreferrer">Source</a>
  </nav>
</header>
<main class="wrap">
  <h1>Your keys</h1>
  <p class="sub">Private keys never leave this browser unless you export them below. We cannot recover lost keys.</p>
  <label for="backup-pass">Passphrase</label>
  <input type="password" id="backup-pass" autocomplete="new-password">
  <button type="button" id="export-btn">Export encrypted backup</button>
  <button type="button" class="secondary" id="import-btn">Import backup</button>
  <label for="backup-json">Backup JSON</label>
  <textarea id="backup-json" placeholder="Paste backup file contents to import"></textarea>
  <div class="footer-links"><a href="/">Home</a></div>
</main>
<script type="module" src="/js/app.js"></script>
</body>
</html>
